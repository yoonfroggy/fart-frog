<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frog Hop Fever</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Game status">
        <div>
          <span class="hud-label">Flies</span>
          <strong id="flyCount">0 / 12</strong>
        </div>
        <div>
          <span class="hud-label">Height</span>
          <strong id="heightLabel">0 m</strong>
        </div>
        <div>
          <span class="hud-label">Best</span>
          <strong id="bestLabel">0 m</strong>
        </div>
      </section>

      <canvas id="game" width="420" height="720" aria-label="Frog jumping game"></canvas>

      <section class="controls" aria-label="Game controls">
        <button id="leftBtn" type="button" aria-label="Move left">Left</button>
        <button id="jumpBtn" type="button" aria-label="Charge jump">Jump</button>
        <button id="rightBtn" type="button" aria-label="Move right">Right</button>
        <button id="resetBtn" type="button" aria-label="Restart run">Restart</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
